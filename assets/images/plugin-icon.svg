<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="256" height="256" fill="#2271b1" rx="20"/>
  
  <!-- Grid/Table Icon -->
  <g transform="translate(48, 48)">
    <!-- Main grid structure -->
    <rect x="0" y="0" width="160" height="160" fill="none" stroke="#ffffff" stroke-width="8" rx="8"/>
    
    <!-- Horizontal lines -->
    <line x1="0" y1="40" x2="160" y2="40" stroke="#ffffff" stroke-width="6"/>
    <line x1="0" y1="80" x2="160" y2="80" stroke="#ffffff" stroke-width="4"/>
    <line x1="0" y1="120" x2="160" y2="120" stroke="#ffffff" stroke-width="4"/>
    
    <!-- Vertical lines -->
    <line x1="40" y1="0" x2="40" y2="160" stroke="#ffffff" stroke-width="4"/>
    <line x1="80" y1="0" x2="80" y2="160" stroke="#ffffff" stroke-width="4"/>
    <line x1="120" y1="0" x2="120" y2="160" stroke="#ffffff" stroke-width="4"/>
    
    <!-- Header row highlight -->
    <rect x="0" y="0" width="160" height="40" fill="#ffffff" fill-opacity="0.15" rx="8"/>
    
    <!-- Gravity Forms integration indicators -->
    <circle cx="20" cy="20" r="6" fill="#ff6b35"/>
    <circle cx="60" cy="20" r="6" fill="#ff6b35"/>
    <circle cx="100" cy="20" r="6" fill="#ff6b35"/>
    <circle cx="140" cy="20" r="6" fill="#ff6b35"/>
    
    <!-- Edit indicators -->
    <circle cx="20" cy="60" r="3" fill="#4ade80"/>
    <circle cx="60" cy="100" r="3" fill="#4ade80"/>
    <circle cx="100" cy="140" r="3" fill="#4ade80"/>
  </g>
  
  <!-- Subtle enhancement - corner accent -->
  <path d="M 236 20 L 236 60 L 216 20 Z" fill="#ffffff" fill-opacity="0.1"/>
</svg>
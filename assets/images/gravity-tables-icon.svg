<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="64" cy="64" r="60" fill="#2271b1" stroke="#135e96" stroke-width="2"/>
  
  <!-- Grid/Table Icon -->
  <g transform="translate(32, 32)">
    <!-- Main grid structure -->
    <rect x="0" y="0" width="64" height="64" fill="none" stroke="#ffffff" stroke-width="3" rx="4"/>
    
    <!-- Horizontal lines -->
    <line x1="0" y1="16" x2="64" y2="16" stroke="#ffffff" stroke-width="2"/>
    <line x1="0" y1="32" x2="64" y2="32" stroke="#ffffff" stroke-width="2"/>
    <line x1="0" y1="48" x2="64" y2="48" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Vertical lines -->
    <line x1="16" y1="0" x2="16" y2="64" stroke="#ffffff" stroke-width="2"/>
    <line x1="32" y1="0" x2="32" y2="64" stroke="#ffffff" stroke-width="2"/>
    <line x1="48" y1="0" x2="48" y2="64" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Header row highlight -->
    <rect x="0" y="0" width="64" height="16" fill="#ffffff" fill-opacity="0.2" rx="4"/>
    
    <!-- Gravity Forms 'G' integration -->
    <circle cx="8" cy="8" r="3" fill="#ff6b35"/>
    <circle cx="24" cy="8" r="3" fill="#ff6b35"/>
    <circle cx="40" cy="8" r="3" fill="#ff6b35"/>
    
    <!-- Edit indicators (small dots) -->
    <circle cx="8" cy="24" r="1.5" fill="#4ade80"/>
    <circle cx="24" cy="40" r="1.5" fill="#4ade80"/>
    <circle cx="40" cy="56" r="1.5" fill="#4ade80"/>
  </g>
  
  <!-- Plugin name text (optional) -->
  <text x="64" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2271b1" font-weight="bold">GRAVITY TABLES</text>
</svg>